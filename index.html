<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15 meses, 15 estrellas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Dancing+Script:wght@600;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-deep:#080b1f;
    --sky-mid:#121a3f;
    --sky-horizon:#1e2a5e;
    --gold:#f4d58d;
    --gold-soft:#f4d58dcc;
    --rose:#f2a6b0;
    --lilac:#c9b6e4;
    --white-star:#fdf8ee;
    --ink:#e9e6f7;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    width:100%;
    min-height:100%;
    background:var(--sky-deep);
    overflow-x:hidden;
    overflow-y:auto;
    font-family:'Playfair Display', Georgia, serif;
  }

  @font-face{ /* system fallback stack handles this; no external font fetch required */ }

  #sky{
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 50% 120%, var(--sky-horizon) 0%, transparent 60%),
      linear-gradient(180deg, var(--sky-deep) 0%, var(--sky-mid) 55%, var(--sky-horizon) 100%);
    overflow:hidden;
  }

  .ambient-star{
    position:absolute;
    background:var(--white-star);
    border-radius:50%;
    opacity:.6;
    animation:twinkle var(--dur,3s) ease-in-out infinite;
    animation-delay:var(--delay,0s);
  }

  @keyframes twinkle{
    0%,100%{opacity:.15; transform:scale(.8);}
    50%{opacity:.9; transform:scale(1.15);}
  }

  .moon{
    position:absolute;
    top:18px;
    right:18px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fffdf3, #f4e9c9 60%, #e8d9a0 100%);
    box-shadow:0 0 30px 10px rgba(244,229,180,.3), 0 0 60px 22px rgba(244,229,180,.12);
    z-index:1;
  }
  @media (min-width:700px){
    .moon{ top:28px; right:34px; width:64px; height:64px; }
  }

  .shooting-star{
    position:absolute;
    width:2px;
    height:2px;
    background:linear-gradient(90deg, white, transparent);
    border-radius:50%;
    opacity:0;
  }

  header{
    position:relative;
    z-index:5;
    text-align:center;
    max-width:800px;
    margin:0 auto;
    padding:max(56px, 9vh) 8vw 2vh;
    pointer-events:none;
  }

  header h1{
    font-weight:600;
    font-size:clamp(1.6rem, 4.4vw, 2.7rem);
    color:var(--gold);
    letter-spacing:.04em;
    line-height:1.25;
    text-shadow:0 0 22px rgba(244,213,141,.45);
  }

  header p{
    margin-top:.6rem;
    font-family:'Quicksand', 'Helvetica Neue', sans-serif;
    font-weight:300;
    font-size:clamp(.85rem, 2vw, 1.05rem);
    color:var(--ink);
    letter-spacing:.06em;
    opacity:.8;
  }

  #constellation-wrap{
    position:relative;
    z-index:4;
    width:min(86vw, 480px);
    aspect-ratio:1/1;
    margin:2vh auto 0;
  }

  svg#lines{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:visible;
  }

  .heart-line{
    fill:none;
    stroke:url(#lineGradient);
    stroke-width:1.4;
    stroke-linecap:round;
    filter:drop-shadow(0 0 4px rgba(244,213,141,.6));
    stroke-dasharray:1;
    stroke-dashoffset:1;
    pathLength:1;
    transition:stroke-dashoffset 1.1s ease;
  }
  .heart-line.lit{ stroke-dashoffset:0; }

  .star-btn{
    position:absolute;
    width:34px;
    height:34px;
    transform:translate(-50%,-50%);
    background:none;
    border:none;
    cursor:pointer;
    padding:0;
    z-index:6;
  }

  .star-btn .core{
    position:absolute;
    inset:0;
    margin:auto;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--white-star);
    box-shadow:0 0 8px 2px rgba(253,248,238,.7);
    transition:all .5s ease;
  }

  .star-btn.done .core{
    background:var(--gold);
    width:16px;
    height:16px;
    box-shadow:0 0 18px 6px rgba(244,213,141,.85), 0 0 34px 14px rgba(244,213,141,.4);
    animation:pulse-gold 2.4s ease-in-out infinite;
  }

  @keyframes pulse-gold{
    0%,100%{filter:brightness(1);}
    50%{filter:brightness(1.35);}
  }

  .star-btn:not(.done):hover .core{
    background:var(--lilac);
    width:13px;height:13px;
    box-shadow:0 0 14px 4px rgba(201,182,228,.7);
  }

  #progress{
    position:relative;
    z-index:5;
    text-align:center;
    margin-top:2vh;
    padding-bottom:6vh;
    font-family:'Quicksand', sans-serif;
    font-weight:300;
    letter-spacing:.08em;
    color:var(--rose);
    font-size:.95rem;
  }

  /* message modal */
  #msg-modal{
    position:fixed;
    inset:0;
    background:rgba(6,8,20,.72);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
    z-index:20;
    padding:6vw;
  }
  #msg-modal.show{ opacity:1; pointer-events:auto; }

  #msg-card{
    max-width:480px;
    text-align:center;
    background:linear-gradient(160deg, rgba(30,42,94,.85), rgba(18,26,63,.9));
    border:1px solid rgba(244,213,141,.35);
    border-radius:18px;
    padding:2.6rem 2.2rem;
    box-shadow:0 0 60px rgba(244,213,141,.15);
    transform:translateY(14px) scale(.97);
    transition:transform .4s ease;
  }
  #msg-modal.show #msg-card{ transform:translateY(0) scale(1); }

  #msg-month{
    font-family:'Quicksand', sans-serif;
    text-transform:uppercase;
    letter-spacing:.25em;
    font-size:.72rem;
    color:var(--gold);
    margin-bottom:.9rem;
  }

  #msg-text{
    font-family:'Dancing Script', cursive;
    font-weight:600;
    font-size:clamp(1.35rem, 3.6vw, 1.75rem);
    color:var(--ink);
    line-height:1.55;
  }

  #msg-close{
    margin-top:1.8rem;
    background:none;
    border:1px solid var(--gold-soft);
    color:var(--gold);
    padding:.55rem 1.6rem;
    border-radius:999px;
    font-family:'Quicksand', sans-serif;
    font-size:.8rem;
    letter-spacing:.08em;
    cursor:pointer;
    transition:background .3s ease;
  }
  #msg-close:hover{ background:rgba(244,213,141,.12); }

  /* finale */
  #finale{
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse at 50% 40%, rgba(30,42,94,.96), rgba(6,8,20,.98));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s ease;
    z-index:30;
    padding:6vw;
    overflow:hidden;
  }
  #finale.show{ opacity:1; pointer-events:auto; }

  #finale h2{
    font-size:clamp(1.6rem, 5vw, 2.6rem);
    color:var(--gold);
    text-shadow:0 0 24px rgba(244,213,141,.5);
    margin-bottom:1.2rem;
  }

  #finale p{
    max-width:520px;
    font-family:'Dancing Script', cursive;
    font-weight:600;
    color:var(--ink);
    font-size:clamp(1.3rem, 4vw, 1.9rem);
    line-height:1.6;
  }

  #finale .signature{
    margin-top:2rem;
    color:var(--rose);
    font-size:1.1rem;
    letter-spacing:.05em;
  }

  /* opening gate */
  #gate{
    position:fixed;
    inset:0;
    z-index:50;
    background:radial-gradient(ellipse at 50% 40%, var(--sky-mid), var(--sky-deep));
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:8vw;
    transition:opacity 1s ease;
  }
  #gate.hide{ opacity:0; pointer-events:none; }
  #gate p.eyebrow{
    font-family:'Quicksand', sans-serif;
    letter-spacing:.3em;
    text-transform:uppercase;
    font-size:.7rem;
    color:var(--rose);
    opacity:.8;
    margin-bottom:1rem;
  }
  #gate h1{
    font-size:clamp(1.8rem, 6vw, 3rem);
    color:var(--gold);
    text-shadow:0 0 24px rgba(244,213,141,.45);
    margin-bottom:2rem;
    line-height:1.3;
  }
  #gate-btn{
    background:none;
    border:1px solid var(--gold-soft);
    color:var(--gold);
    font-family:'Quicksand', sans-serif;
    letter-spacing:.1em;
    font-size:.85rem;
    padding:.9rem 2.2rem;
    border-radius:999px;
    cursor:pointer;
    transition:background .3s ease, transform .3s ease;
    animation:gate-pulse 2.6s ease-in-out infinite;
  }
  #gate-btn:hover{ background:rgba(244,213,141,.14); transform:scale(1.04); }
  @keyframes gate-pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(244,213,141,.25); }
    50%{ box-shadow:0 0 0 10px rgba(244,213,141,0); }
  }

  .floating-heart{
    position:absolute;
    bottom:-10%;
    opacity:0;
    pointer-events:none;
    filter:drop-shadow(0 0 6px rgba(242,166,176,.5));
  }

  /* handwritten note polaroid */
  .polaroid{
    background:#f4f1ea;
    padding:12px 12px 34px;
    border-radius:4px;
    box-shadow:0 18px 40px rgba(0,0,0,.45);
    transform:rotate(-3deg);
    margin:0 auto 1.8rem;
    width:min(78vw, 260px);
  }
  .polaroid img{
    display:block;
    width:100%;
    border-radius:2px;
  }
  .polaroid .cap{
    font-family:'Dancing Script', cursive;
    font-size:1.1rem;
    text-align:center;
    color:#2c2a3a;
    margin-top:10px;
  }

  @media (prefers-reduced-motion: reduce){
    .ambient-star, .star-btn.done .core, .shooting-star{ animation:none !important; }
  }
</style>
</head>
<body>

<div id="gate">
  <p class="eyebrow">15 meses juntos</p>
  <h1>Tengo un cielo<br>que quiero mostrarte</h1>
  <button id="gate-btn">abrir ♡</button>
</div>

<div id="sky"></div>

<header>
  <h1>Para mi Rabanita ✨</h1>
  <p>15 meses juntos · toca cada estrella para descubrir el cielo que hemos construido</p>
</header>

<div id="constellation-wrap">
  <svg id="lines" viewBox="0 0 100 100" preserveAspectRatio="none">
    <defs>
      <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f4d58d"/>
        <stop offset="100%" stop-color="#f2a6b0"/>
      </linearGradient>
    </defs>
  </svg>
  <!-- star buttons injected by JS -->
</div>

<div id="progress">0 / 15 estrellas encontradas</div>

<div id="msg-modal">
  <div id="msg-card">
    <div id="msg-month"></div>
    <div id="msg-text"></div>
    <button id="msg-close">cerrar</button>
  </div>
</div>

<div id="finale">

  "Mes 4 — Los planes tontos que se volvieron nuestros favoritos.",
  "Mes 5 — Aprender a resolver diferencias sin dejar de elegirnos.",
  "Mes 6 — Medio año, y cada día quería un poco más de ti.",
  "Mes 7 — Las noches de nada especial que terminaron siendo las mejores.",
  "Mes 8 — Descubrir que tu calma es mi lugar favorito para llegar.",
  "Mes 9 — Cada 'buenos días' tuyo cambia el resto de mi día.",
  "Mes 10 — Aprendiendo a construir contigo, no solo a estar contigo.",
  "Mes 11 — Lo fácil que se ha vuelto imaginar el futuro cuando estás en él.",
  "Mes 12 — Un año entero, y todavía se siente como el primer día bueno.",
  "Mes 13 — Los pequeños detalles tuyos que ya no puedo imaginar no tener.",
  "Mes 14 — Gracias por tu paciencia, por tu apoyo, por creer en mí.",
  "Mes 15 — Hoy, mirando este cielo, solo pienso en cuánto te quiero."
];

/* ========================================================================= */

// ---------- Ambient starfield ----------
const sky = document.getElementById('sky');
const AMBIENT_COUNT = 160;
for(let i=0;i<AMBIENT_COUNT;i++){
  const s = document.createElement('div');
  s.className = 'ambient-star';
  const size = Math.random()*2 + 0.6;
  s.style.width = size+'px';
  s.style.height = size+'px';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  s.style.setProperty('--dur', (2 + Math.random()*4)+'s');
  s.style.setProperty('--delay', (Math.random()*4)+'s');
  sky.appendChild(s);
}

const moon = document.createElement('div');
moon.className = 'moon';
sky.appendChild(moon);

// ---------- Shooting stars ----------
function launchShootingStar(){
  const s = document.createElement('div');
  s.className = 'shooting-star';
  const startX = Math.random()*70 + '%';
  const startY = Math.random()*30 + '%';
  s.style.left = startX;
  s.style.top = startY;
  s.style.width = (60+Math.random()*60)+'px';
  s.style.height = '2px';
  s.style.transformOrigin = 'left center';
  s.style.transform = 'rotate(35deg)';
  sky.appendChild(s);

  s.animate([
    { opacity:0, transform:'rotate(35deg) translateX(0)' },
    { opacity:1, offset:0.1 },
    { opacity:0, transform:'rotate(35deg) translateX(340px)' }
  ], { duration: 1100, easing:'ease-out' });

  setTimeout(()=> s.remove(), 1200);
}
setInterval(()=>{
  if(Math.random() < 0.6) launchShootingStar();
}, 3200);

// ---------- Floating hearts ----------
function launchFloatingHeart(){
  const h = document.createElement('div');
  h.className = 'floating-heart';
  const size = 8 + Math.random()*10;
  h.style.left = Math.random()*100+'%';
  h.style.fontSize = size+'px';
  h.style.color = Math.random() > 0.5 ? 'var(--rose)' : 'var(--lilac)';
  h.textContent = '♡';
  sky.appendChild(h);

  const drift = (Math.random()-0.5) * 60;
  h.animate([
    { opacity:0, transform:`translate(0,0) rotate(0deg)` },
    { opacity:.55, offset:0.15 },
    { opacity:.55, offset:0.8 },
    { opacity:0, transform:`translate(${drift}px, -115vh) rotate(${drift>0?20:-20}deg)` }
  ], { duration: 9000 + Math.random()*4000, easing:'ease-out' });

  setTimeout(()=> h.remove(), 13500);
}
setInterval(()=>{
  if(Math.random() < 0.7) launchFloatingHeart();
}, 2600);

// ---------- Opening gate ----------
document.getElementById('gate-btn').addEventListener('click', ()=>{
  document.getElementById('gate').classList.add('hide');
});


const N = 15;

function heartPoint(t){
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
  return {x, y};
}

// sample the curve at high resolution, then walk it by equal arc-length
// so the 15 points land evenly spaced around the outline (this keeps the
// heart symmetric instead of bunching points near the top notch)
const RES = 2000;
const curve = [];
for(let i=0;i<=RES;i++){
  curve.push(heartPoint((i/RES) * Math.PI * 2));
}
const cum = [0];
for(let i=1;i<curve.length;i++){
  const dx = curve[i].x - curve[i-1].x;
  const dy = curve[i].y - curve[i-1].y;
  cum.push(cum[i-1] + Math.sqrt(dx*dx + dy*dy));
}
const total = cum[cum.length-1];

const points = [];
for(let k=0;k<N;k++){
  const targetLen = (k / N) * total;
  let idx = cum.findIndex(c => c >= targetLen);
  if(idx < 0) idx = cum.length - 1;
  points.push(curve[idx]);
}

// normalize to 8..92 range on a 100x100 viewbox
const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
const minX=Math.min(...xs), maxX=Math.max(...xs);
const minY=Math.min(...ys), maxY=Math.max(...ys);
const norm = points.map(p=>({
  x: 8 + (p.x - minX) / (maxX - minX) * 84,
  y: 8 + (p.y - minY) / (maxY - minY) * 84
}));

const wrap = document.getElementById('constellation-wrap');
const svg = document.getElementById('lines');
const found = new Array(N).fill(false);
let foundCount = 0;

// create line segments (adjacent points, closing the loop)
const lineEls = [];
for(let i=0;i<N;i++){
  const a = norm[i], b = norm[(i+1)%N];
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', `M ${a.x} ${a.y} L ${b.x} ${b.y}`);
  path.setAttribute('class','heart-line');
  path.setAttribute('pathLength','1');
  svg.appendChild(path);
  lineEls.push(path);
}

// create star buttons
const starEls = [];
norm.forEach((p,i)=>{
  const btn = document.createElement('button');
  btn.className = 'star-btn';
  btn.style.left = p.x+'%';
  btn.style.top = p.y+'%';
  btn.innerHTML = '<span class="core"></span>';
  btn.addEventListener('click', ()=> revealStar(i));
  wrap.appendChild(btn);
  starEls.push(btn);
});

function updateLines(i){
  // light a line if both endpoints are found
  const prev = (i-1+N)%N;
  const next = (i+1)%N;
  if(found[i] && found[next]) lineEls[i].classList.add('lit');
  if(found[prev] && found[i]) lineEls[prev].classList.add('lit');
}

const progressEl = document.getElementById('progress');
const modal = document.getElementById('msg-modal');
const msgMonth = document.getElementById('msg-month');
const msgText = document.getElementById('msg-text');

function revealStar(i){
  if(found[i]) { openModal(i); return; }
  found[i] = true;
  foundCount++;
  starEls[i].classList.add('done');
  updateLines(i);
  progressEl.textContent = `${foundCount} / ${N} estrellas encontradas`;
  openModal(i);
  if(foundCount === N){
    setTimeout(showFinale, 1400);
  }
}

function openModal(i){
  msgMonth.textContent = `mes ${i+1} de 15`;
  msgText.textContent = MENSAJES[i];
  modal.classList.add('show');
}
document.getElementById('msg-close').addEventListener('click', ()=>{
  modal.classList.remove('show');
});
modal.addEventListener('click', (e)=>{
  if(e.target === modal) modal.classList.remove('show');
});

// ---------- Finale ----------
function showFinale(){
  document.getElementById('finale-text').textContent = MENSAJE_FINAL;
  const finale = document.getElementById('finale');
  finale.classList.add('show');
  launchFireworks(finale);
}

function launchFireworks(container){
  const colors = ['#f4d58d','#f2a6b0','#c9b6e4','#fdf8ee'];
  function burst(cx, cy){
    for(let i=0;i<26;i++){
      const p = document.createElement('div');
      p.className = 'spark';
      const size = 3+Math.random()*3;
      p.style.width = size+'px';
      p.style.height = size+'px';
      p.style.left = cx+'px';
      p.style.top = cy+'px';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      container.appendChild(p);
      const angle = Math.random()*Math.PI*2;
      const dist = 60 + Math.random()*120;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist;
      p.animate([
        { transform:'translate(0,0)', opacity:1 },
        { transform:`translate(${dx}px, ${dy}px)`, opacity:0 }
      ], { duration: 1100 + Math.random()*500, easing:'cubic-bezier(.2,.6,.3,1)' });
      setTimeout(()=>p.remove(), 1700);
    }
  }
  let bursts = 0;
  const interval = setInterval(()=>{
    burst(Math.random()*window.innerWidth, window.innerHeight*0.25 + Math.random()*window.innerHeight*0.3);
    bursts++;
    if(bursts>6) clearInterval(interval);
  }, 500);
}
</script>
